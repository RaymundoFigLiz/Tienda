<div class="flex justify-between items-center mb-4">
  <h2 class="text-xl font-semibold">Tiendas</h2>

  <button mat-raised-button color="primary" (click)="create()">
    <mat-icon>add</mat-icon>
    Nueva
  </button>
</div>

<table mat-table [dataSource]="stores()" class="w-full">
  <ng-container matColumnDef="name">
    <th mat-header-cell *matHeaderCellDef>Nombre</th>
    <td mat-cell *matCellDef="let item">{{ item.name }}</td>
  </ng-container>

  <ng-container matColumnDef="address">
    <th mat-header-cell *matHeaderCellDef>Dirección</th>
    <td mat-cell *matCellDef="let item">{{ item.address }}</td>
  </ng-container>

  <ng-container matColumnDef="postalCode">
    <th mat-header-cell *matHeaderCellDef>Código Postal</th>
    <td mat-cell *matCellDef="let item">{{ item.postalCode }}</td>
  </ng-container>

  <ng-container matColumnDef="internalNumber">
    <th mat-header-cell *matHeaderCellDef>Número Interior</th>
    <td mat-cell *matCellDef="let item">{{ item.internalNumber }}</td>
  </ng-container>

  <ng-container matColumnDef="externalNumber">
    <th mat-header-cell *matHeaderCellDef>Número Exterior</th>
    <td mat-cell *matCellDef="let item">{{ item.externalNumber }}</td>
  </ng-container>

  <ng-container matColumnDef="actions">
    <th mat-header-cell *matHeaderCellDef>Acciones</th>
    <td mat-cell *matCellDef="let item">
      <button mat-icon-button color="primary" (click)="edit(item)">
        <mat-icon>edit</mat-icon>
      </button>
      <button mat-icon-button color="danger" (click)="delete(item)">
        <mat-icon>delete</mat-icon>
      </button>
    </td>
  </ng-container>

  <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
  <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
</table>
