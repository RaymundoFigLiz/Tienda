<div class="flex justify-between items-center mb-4">
  <h2 class="text-xl font-semibold">Articulos de Tienda</h2>

  <button mat-raised-button color="primary" (click)="create()">
    <mat-icon>add</mat-icon>
    Nueva
  </button>
</div>

<table mat-table [dataSource]="storeItems()" class="w-full">
  <ng-container matColumnDef="storeName">
    <th mat-header-cell *matHeaderCellDef>Tienda</th>
    <td mat-cell *matCellDef="let item">{{ item.storeName }}</td>
  </ng-container>

  <ng-container matColumnDef="itemName">
    <th mat-header-cell *matHeaderCellDef>Artículo</th>
    <td mat-cell *matCellDef="let item">{{ item.itemName }}</td>
  </ng-container>

  <ng-container matColumnDef="price">
    <th mat-header-cell *matHeaderCellDef>Precio</th>
    <td mat-cell *matCellDef="let item">${{ item.price }}</td>
  </ng-container>

  <ng-container matColumnDef="stock">
    <th mat-header-cell *matHeaderCellDef>Cantidad Disponible</th>
    <td mat-cell *matCellDef="let item">{{ item.stock }}</td>
  </ng-container>

  <ng-container matColumnDef="actions">
    <th mat-header-cell *matHeaderCellDef>Acciones</th>
    <td mat-cell *matCellDef="let item">
      <button mat-icon-button color="primary" (click)="edit(item)">
        <mat-icon>edit</mat-icon>
      </button>
      <button mat-icon-button color="danger" (click)="delete(item)">
        <mat-icon>delete</mat-icon>
      </button>
    </td>
  </ng-container>

  <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
  <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
</table>
