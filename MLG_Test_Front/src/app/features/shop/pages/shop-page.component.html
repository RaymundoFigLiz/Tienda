<div class="grid grid-cols-12 gap-4">
  <div class="col-span-9">
    <div class="flex gap-4 flex-wrap">
      @for (storeItem of storeItems(); track storeItem.id) {
        <mat-card class="w-80 flex flex-col rounded-2xl shadow-md overflow-hidden">
          <mat-card-header>
            <mat-card-title> {{ storeItem.itemName }}</mat-card-title>
            <mat-card-subtitle>{{ storeItem.storeName }}</mat-card-subtitle>
          </mat-card-header>
          @if (storeItem.itemImage) {
            <div>
              <img
                mat-card-image
                [src]="storeItem.itemImage"
                [alt]="storeItem.itemName"
                class="w-full h-48 object-contain bg-gray-100"
              />
            </div>
          } @else {
            <div class="w-full h-48 object-contain bg-gray-100 flex items-center justify-center">
              <mat-icon class="text-gray-400 text-6xl"> image </mat-icon>
            </div>
          }
          <mat-card-content>
            <div class="flex justify-between items-center">
              <p>
                {{ storeItem.itemCode }}
              </p>
              <p class="text-2xl">${{ storeItem.price }}</p>
            </div>
          </mat-card-content>
          <mat-card-actions>
            <p>{{ storeItem.stock }} Disponibles</p>
            <button class="ml-auto" matButton (click)="add(storeItem)">Agregar al carrito</button>
          </mat-card-actions>
        </mat-card>
      }
    </div>
  </div>

  <div class="col-span-3">
    <app-cart (refreshData)="onRefreshData()"></app-cart>
  </div>
</div>
